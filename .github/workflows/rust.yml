name: Supply Chain Security — Rust

on:
  workflow_call:
    inputs:
      image-name:
        required: false
        type: string
        description: "Docker image to scan after build (optional)"

permissions:
  contents: read

jobs:
  scan:
    name: SBOM + Trivy + cargo-audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo binaries
        id: cache-cargo-bin
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: cargo-bin-cyclonedx-audit-v1

      - name: Install cargo-cyclonedx and cargo-audit
        if: steps.cache-cargo-bin.outputs.cache-hit != 'true'
        run: |
          cargo install cargo-cyclonedx --locked
          cargo install cargo-audit --locked

      - name: Generate SBOM (CycloneDX)
        run: cargo cyclonedx --format json

      - name: Locate SBOM file
        id: sbom
        run: |
          SBOM_FILE=$(find . -name "*.cdx.json" -not -path './target/*' | head -1)
          echo "Found SBOM: $SBOM_FILE"
          echo "path=$SBOM_FILE" >> "$GITHUB_OUTPUT"

      - name: Run Trivy on SBOM
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: sbom
          scan-ref: ${{ steps.sbom.outputs.path }}
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - name: Run Trivy — secrets + IaC
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret,config
          format: table
          output: trivy-extra.txt
          exit-code: '0'
          skip-setup-trivy: true

      - name: Run Trivy — Docker image
        if: ${{ inputs.image-name != '' }}
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ inputs.image-name }}
          format: table
          output: trivy-image.txt
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: '0'
          skip-setup-trivy: true

      - name: Run cargo-audit
        run: cargo audit > cargo-audit.txt 2>&1 || true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: ${{ steps.sbom.outputs.path }}
          retention-days: 90

      - name: Job Summary
        if: always()
        run: |
          {
            echo "# Supply Chain Security Report — Rust"
            echo ""
            echo "**Commit:** \`${GITHUB_SHA:0:7}\` | **Repo:** \`${GITHUB_REPOSITORY}\`"
            echo ""
            echo "## Trivy (SBOM)"
            echo '```'
            [ -s trivy-results.txt ] && cat trivy-results.txt || echo "No vulnerabilities found."
            echo '```'
            echo ""
            echo "## Trivy (Secrets + IaC)"
            echo '```'
            [ -s trivy-extra.txt ] && cat trivy-extra.txt || echo "Clean."
            echo '```'
            echo ""
            echo "## Trivy (Docker Image)"
            echo '```'
            [ -s trivy-image.txt ] && cat trivy-image.txt || echo "No image scanned."
            echo '```'
            echo ""
            echo "## cargo-audit (RustSec)"
            echo '```'
            [ -s cargo-audit.txt ] && cat cargo-audit.txt || echo "No advisories."
            echo '```'
            echo ""
            echo "---"
            echo "_SBOM available as workflow artifact: \`sbom-cyclonedx\`_"
          } >> "$GITHUB_STEP_SUMMARY"
