name: Supply Chain Security — Frontend

on:
  workflow_call:

permissions:
  contents: read

jobs:
  scan:
    name: SBOM + Trivy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy — vulnerabilities + secrets + IaC
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,config
          format: table
          output: trivy-results.txt
          severity: CRITICAL,HIGH,MEDIUM,LOW
          exit-code: '0'

      - name: Generate SBOM (CycloneDX)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.cdx.json
          skip-setup-trivy: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Job Summary
        if: always()
        run: |
          {
            echo "# Supply Chain Security Report — Frontend"
            echo ""
            echo "**Commit:** \`${GITHUB_SHA:0:7}\` | **Repo:** \`${GITHUB_REPOSITORY}\`"
            echo ""
            echo "## Trivy (filesystem)"
            echo '```'
            [ -s trivy-results.txt ] && cat trivy-results.txt || echo "No vulnerabilities found."
            echo '```'
            echo ""
            echo "---"
            echo "_SBOM available as workflow artifact: \`sbom-cyclonedx\`_"
          } >> "$GITHUB_STEP_SUMMARY"
